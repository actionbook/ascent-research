name = "tech"
description = "Rust / AI / general tech — HN + GitHub + arXiv"

[[rule]]
kind = "hn-item"
host = "news.ycombinator.com"
path = "/item"
query_param = { id = "[0-9]+" }
executor = "browser"
template = '''actionbook browser new-tab "{url}" --session <s> --tab <t> && actionbook browser wait network-idle --session <s> --tab <t> && actionbook browser text --session <s> --tab <t>'''

[[rule]]
kind = "hn-topstories"
host = "news.ycombinator.com"
path_any_of = ["/", "", "/news"]
executor = "browser"
template = '''actionbook browser new-tab "{url}" --session <s> --tab <t> && actionbook browser wait network-idle --session <s> --tab <t> && actionbook browser text --session <s> --tab <t>'''

[[rule]]
kind = "github-issue"
host = "github.com"
path_segments = ["{owner}", "{repo}", "issues", "{num}"]
executor = "postagent"
template = 'postagent send "https://api.github.com/repos/{owner}/{repo}/issues/{num}" -H "Authorization: Bearer $POSTAGENT.GITHUB.TOKEN"'

# Incremental source reading — /blob/<ref>/<path> → raw.githubusercontent.com
# Raw host doesn't count against GitHub's anonymous rate limit.
[[rule]]
kind = "github-file"
host = "github.com"
path_segments = ["{owner}", "{repo}", "blob", "{ref}", "{...path}"]
executor = "browser"
template = '''actionbook browser new-tab "https://raw.githubusercontent.com/{owner}/{repo}/{ref}/{path}" --session <s> --tab <t> && actionbook browser wait network-idle --session <s> --tab <t> && actionbook browser text --session <s> --tab <t>'''

# Directory listing — /tree/<ref>/<path> → Contents API (base64 or JSON listing).
[[rule]]
kind = "github-tree"
host = "github.com"
path_segments = ["{owner}", "{repo}", "tree", "{ref}", "{...path}"]
executor = "postagent"
template = 'postagent send "https://api.github.com/repos/{owner}/{repo}/contents/{path}?ref={ref}" -H "Authorization: Bearer $POSTAGENT.GITHUB.TOKEN"'

# Pass-through for raw.githubusercontent.com URLs — return the raw bytes.
[[rule]]
kind = "github-raw"
host = "raw.githubusercontent.com"
path_segments = ["{owner}", "{repo}", "{ref}", "{...path}"]
executor = "browser"
template = '''actionbook browser new-tab "{url}" --session <s> --tab <t> && actionbook browser wait network-idle --session <s> --tab <t> && actionbook browser text --session <s> --tab <t>'''

[[rule]]
kind = "github-repo-readme"
host = "github.com"
path_segments = ["{owner}", "{repo}"]
executor = "postagent"
template = 'postagent send "https://api.github.com/repos/{owner}/{repo}/readme" -H "Authorization: Bearer $POSTAGENT.GITHUB.TOKEN"'

[[rule]]
kind = "arxiv-abs"
host = "arxiv.org"
path_segments = ["abs", "{id}"]
executor = "browser"
template = '''actionbook browser new-tab "{url}" --session <s> --tab <t> && actionbook browser wait network-idle --session <s> --tab <t> && actionbook browser text --session <s> --tab <t>'''

# ─── x.com (and twitter.com mirror) ───────────────────────────────────────
# Spec: specs/x-com-tweet-runcode-flavor.spec.md
#
# These rules route x.com URLs through the browser executor so the V2
# backend picks up the XTweet runcode flavor (via flavor_for_url) — the
# default networkidle-then-poll waits don't capture X's lazy-hydrated
# <article> element. V1 CLI users hit the same template and benefit from
# v1 actionbook's own selector-aware waits.

[[rule]]
kind = "x-tweet-status"
host = "x.com"
path_segments = ["{user}", "status", "{id}"]
executor = "browser"
template = '''actionbook browser new-tab "{url}" --session <s> --tab <t> && actionbook browser wait network-idle --session <s> --tab <t> && actionbook browser text --session <s> --tab <t>'''

[[rule]]
kind = "x-search-live"
host = "x.com"
path_segments = ["search"]
executor = "browser"
template = '''actionbook browser new-tab "{url}" --session <s> --tab <t> && actionbook browser wait network-idle --session <s> --tab <t> && actionbook browser text --session <s> --tab <t>'''

[[rule]]
kind = "x-profile"
host = "x.com"
path_segments = ["{user}"]
executor = "browser"
template = '''actionbook browser new-tab "{url}" --session <s> --tab <t> && actionbook browser wait network-idle --session <s> --tab <t> && actionbook browser text --session <s> --tab <t>'''

[fallback]
executor = "browser"
kind = "browser-fallback"
template = '''actionbook browser new-tab "{url}" --session <s> --tab <t> && actionbook browser wait network-idle --session <s> --tab <t> && actionbook browser text --session <s> --tab <t>'''
