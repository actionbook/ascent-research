[package]
name = "ascent-research"
version = "0.3.1"
edition = "2024"
description = "ascent-research — an incremental research workflow CLI for AI agents. Every session resumes; knowledge accretes across runs. Mixes HTTP, browser, and local file ingest into a durable per-session wiki + figure-rich HTML report."
license = "MIT"
repository = "https://github.com/actionbook/ascent-research"
homepage = "https://github.com/actionbook/ascent-research"
readme = "../../README.md"
keywords = ["research", "cli", "agent", "llm", "wiki"]
categories = ["command-line-utilities", "development-tools"]
# Keep the published crate small: include only what the binary needs at
# build time. `presets/tech.toml` is pulled in via `include_str!` from
# `src/route/rules.rs`, so it must be listed too.
include = [
    "src/**/*",
    "presets/tech.toml",
    "presets/sports.toml",
    "presets/github-trust.toml",
    "templates/**/*",
    "../../README.md",
]

[[bin]]
name = "ascent-research"
path = "src/main.rs"

[lib]
name = "research"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", default-features = false, features = ["serde", "clock"] }
dirs = "6"
fs2 = "0.4"
toml = "0.8"
regex = "1"
pulldown-cmark = { version = "0.13", default-features = false, features = ["html"] }
walkdir = "2"
globset = "0.4"

# Autoresearch loop dependencies — each is optional and only pulled in under
# the matching feature. Default build stays LLM-free.
async-trait = { version = "0.1", optional = true }
tokio = { version = "1", features = ["rt", "macros", "process", "io-util", "time"], optional = true }
cc-sdk = { version = "0.8", optional = true }

[features]
# `cargo install ascent-research` ships with the autonomous loop built in
# — every playbook in the skill assumes `ascent-research loop` exists.
# The fake provider alone is useful for manual debug; real LLM providers
# remain opt-in because `cc-sdk` and `codex` pull heavy deps.
default = ["autoresearch"]
# Umbrella feature: enables the `research loop` and `research plan` commands
# plus the AgentProvider trait. Does NOT by itself include a provider impl.
autoresearch = ["dep:async-trait", "dep:tokio"]
# Provider implementations. Each implies `autoresearch`.
provider-claude = ["autoresearch", "dep:cc-sdk"]
provider-codex  = ["autoresearch"]

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
